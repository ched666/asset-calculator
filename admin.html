<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品配置后台</title>
    <link rel="stylesheet" href="style.css">
    <script>
        // 管理员权限检查
        const userRole = sessionStorage.getItem('userRole');
        if (userRole !== 'admin') {
            alert('需要管理员权限才能访问此页面');
            window.location.href = 'login.html';
        }
    </script>
</head>
<body>
    <div class="container">
        <header>
            <h1>产品配置后台</h1>
            <div>
                <a href="schemes-admin.html" class="admin-link" style="margin-right: 10px;">方案管理</a>
                <a href="index.html" class="admin-link" style="margin-right: 10px;">返回计算器</a>
                <button class="btn-secondary" onclick="logout()" style="font-size: 12px; padding: 5px 15px;">退出登录</button>
            </div>
        </header>
        <script>
            function logout() {
                sessionStorage.clear();
                localStorage.removeItem('hasLoggedIn');
                window.location.href = 'login.html';
            }
        </script>

        <div class="card">
            <h2>存款产品配置</h2>
            <div id="depositProducts"></div>
            <button class="btn-secondary" onclick="addDeposit()">+ 添加存款产品</button>
        </div>

        <div class="card">
            <h2>理财产品配置</h2>
            <div id="wealthProducts"></div>
            <button class="btn-secondary" onclick="addWealth()">+ 添加理财产品</button>
        </div>

        <div class="button-group">
            <button class="btn-primary" onclick="saveConfig()">保存配置</button>
            <button class="btn-secondary" onclick="resetConfig()">恢复默认</button>
        </div>

        <div class="card">
            <h2>☁️ 云端配置共享</h2>
            <p style="color: #666; margin-bottom: 20px;">
                修改产品配置后，点击“发布共享”即可同步到云端，所有新用户将自动加载最新配置
            </p>
            
            <div style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
                <button class="btn-primary" onclick="saveAndPublish()" style="font-size: 16px; padding: 12px 30px;">
                    💾 保存配置
                </button>
                <button class="btn-primary" onclick="publishToCloud()" style="font-size: 16px; padding: 12px 30px; background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);">
                    🚀 发布共享
                </button>
                <button class="btn-secondary" onclick="testToken()" style="font-size: 14px; padding: 10px 20px;">
                    🔍 测试Token
                </button>
                <button class="btn-secondary" onclick="resetToken()" style="font-size: 14px; padding: 10px 20px;">
                    🔑 重置Token
                </button>
            </div>
            
            <div id="publishStatus" style="margin-top: 15px; font-size: 14px; text-align: center;"></div>
            
            <div style="margin-top: 20px; padding: 15px; background: #f0f7ff; border-radius: 8px; border-left: 4px solid #667eea;">
                <p style="margin: 0; color: #555; font-size: 14px;">
                    <strong>💡 提示：</strong><br>
                    • 保存配置：仅保存到本地浏览器<br>
                    • 发布共享：推送到云端，所有用户可见<br>
                    • <strong>首次使用请点击“🔍 测试Token”检查配置</strong><br>
                    • 遇到错误请点击“🔑 重置Token”重新配置<br>
                    • 发布时会同时上传产品配置和银行推荐方案
                </p>
            </div>
        </div>

        <div id="saveMessage" class="save-message" style="display: none;">
            ✓ 配置已保存
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
